<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARES - Component Allocation for Robotics & Embedded Systems</title>
    <!-- Menggunakan Tailwind CSS untuk styling yang cepat dan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af', // UB Blue
                        secondary: '#f59e0b', // Accent
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <!-- SCREEN 1: LOGIN (Sesuai UC-01) -->
    <div id="loginScreen" class="flex-1 flex items-center justify-center fade-in">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-primary">
            <div class="text-center mb-8">
                <div class="bg-primary text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-lg">
                    <i class="fa-solid fa-microchip"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">CARES</h1>
                <p class="text-sm text-gray-500 mt-1">Robotics & Embedded Systems Lab</p>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">NIM / Email UB</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="nimInput" required class="pl-10 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Masukkan NIM">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kata Sandi</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-3 text-gray-400"></i>
                        <input type="password" required class="pl-10 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg transition shadow-md flex justify-center items-center gap-2">
                    Masuk ke Sistem <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- SCREEN 2: DASHBOARD & KATALOG (Sesuai UC-02 & UC-03) -->
    <div id="dashboardScreen" class="hidden flex-1 flex flex-col fade-in">
        <!-- Navbar -->
        <nav class="bg-primary text-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-microchip text-2xl"></i>
                        <span class="font-bold text-xl tracking-wider">CARES</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-sm hidden sm:block"><i class="fa-regular fa-user mr-1"></i> <span id="userNameDisplay">Mahasiswa</span></span>
                        <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded text-sm font-medium transition shadow">
                            <i class="fa-solid fa-right-from-bracket mr-1"></i> Keluar
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Konten Utama -->
        <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Katalog Alat Lab</h2>
                    <p class="text-sm text-gray-500">Pilih komponen yang ingin Anda reservasi.</p>
                </div>
                <div class="relative hidden sm:block">
                    <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                    <input type="text" class="pl-10 p-2 border border-gray-300 rounded-lg w-64 text-sm outline-none focus:border-primary" placeholder="Cari alat...">
                </div>
            </div>

            <!-- Grid Katalog -->
            <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Item di-generate melalui JavaScript -->
            </div>
        </main>
    </div>

    <!-- MODAL: FORM RESERVASI -->
    <div id="bookingModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 fade-in">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden">
            <div class="bg-primary p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">Form Reservasi Alat</h3>
                <button onclick="closeModal('bookingModal')" class="text-white hover:text-gray-200"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            <div class="p-6">
                <div class="flex gap-4 items-center mb-6 p-3 bg-blue-50 rounded-lg border border-blue-100">
                    <div class="text-3xl text-primary"><i id="modalIcon" class="fa-solid fa-microchip"></i></div>
                    <div>
                        <p class="text-sm text-gray-500">Alat yang dipilih:</p>
                        <p id="modalToolName" class="font-bold text-gray-800">Nama Alat</p>
                    </div>
                </div>
                
                <form id="bookingForm" onsubmit="submitBooking(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tujuan Peminjaman</label>
                        <select required class="w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-primary">
                            <option value="">-- Pilih Tujuan --</option>
                            <option value="Praktikum">Praktikum / Tugas Kelas</option>
                            <option value="Proyek Akhir">Proyek Akhir / Skripsi</option>
                            <option value="Lomba">Persiapan Lomba/Kompetisi</option>
                        </select>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Rencana Tanggal Pengembalian</label>
                        <input type="date" required class="w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-primary">
                    </div>
                    <div class="flex gap-3">
                        <button type="button" onclick="closeModal('bookingModal')" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition">Batal</button>
                        <button type="submit" class="flex-1 bg-secondary hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded-lg transition">Konfirmasi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL: TIKET SUKSES -->
    <div id="ticketModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 fade-in">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full overflow-hidden text-center">
            <div class="bg-green-500 p-6 text-white">
                <i class="fa-solid fa-circle-check text-5xl mb-2"></i>
                <h3 class="font-bold text-xl">Reservasi Berhasil!</h3>
            </div>
            <div class="p-6">
                <p class="text-gray-600 text-sm mb-4">Tunjukkan kode tiket ini kepada Asisten Lab untuk mengambil komponen.</p>
                
                <!-- Mockup QR Code -->
                <div class="border-2 border-dashed border-gray-300 p-4 rounded-lg inline-block mb-4">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CARES-TKT-9981" alt="QR Code" class="mx-auto w-32 h-32">
                </div>
                
                <div class="bg-gray-100 p-2 rounded text-lg font-mono font-bold tracking-widest text-gray-800 mb-6">
                    TKT-<span id="ticketNumber">9981</span>
                </div>
                
                <button onclick="finishBooking()" class="w-full bg-primary hover:bg-blue-800 text-white font-bold py-2 px-4 rounded-lg transition">Selesai & Kembali ke Katalog</button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Data Simulasi Alat Lab (Database Mockup)
        const toolsData = [
            { id: 1, name: "Arduino Uno R3", category: "Mikrokontroler", stock: 12, icon: "fa-microchip" },
            { id: 2, name: "NodeMCU ESP8266", category: "IoT Board", stock: 5, icon: "fa-wifi" },
            { id: 3, name: "Raspberry Pi 4 Model B", category: "SBC", stock: 0, icon: "fa-server" }, // Stok kosong untuk simulasi
            { id: 4, name: "Sensor Ultrasonik HC-SR04", category: "Sensor", stock: 20, icon: "fa-satellite-dish" },
            { id: 5, name: "Motor Servo SG90", category: "Aktuator", stock: 8, icon: "fa-gear" },
            { id: 6, name: "Kabel Jumper Male-Female", category: "Aksesoris", stock: 50, icon: "fa-plug" },
        ];

        let selectedToolId = null;

        // Fungsi Render Katalog
        function renderCatalog() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';

            toolsData.forEach(tool => {
                const isOutOfStock = tool.stock === 0;
                
                // Card HTML
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl shadow border border-gray-100 overflow-hidden flex flex-col transition hover:shadow-lg ${isOutOfStock ? 'opacity-75' : ''}`;
                
                card.innerHTML = `
                    <div class="p-6 flex-1">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-12 h-12 rounded-lg bg-blue-50 text-primary flex items-center justify-center text-2xl">
                                <i class="fa-solid ${tool.icon}"></i>
                            </div>
                            <span class="text-xs font-bold px-2 py-1 rounded-full ${isOutOfStock ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                ${isOutOfStock ? 'Stok Habis' : 'Tersedia: ' + tool.stock}
                            </span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-800 mb-1">${tool.name}</h3>
                        <p class="text-sm text-gray-500">${tool.category}</p>
                    </div>
                    <div class="px-6 pb-6 mt-auto">
                        <button 
                            onclick="openBookingModal(${tool.id})" 
                            class="w-full py-2 rounded-lg font-bold transition flex justify-center items-center gap-2
                            ${isOutOfStock ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-primary hover:bg-blue-800 text-white'}"
                            ${isOutOfStock ? 'disabled' : ''}>
                            <i class="fa-regular fa-calendar-check"></i> Reservasi
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Alur UC-01: Autentikasi ---
        function handleLogin(event) {
            event.preventDefault(); // Mencegah halaman refresh
            const nim = document.getElementById('nimInput').value;
            
            // Set nama user (simulasi)
            document.getElementById('userNameDisplay').innerText = "Mahasiswa (" + nim + ")";
            
            // Pindah layar
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            
            renderCatalog();
        }

        function handleLogout() {
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginForm').reset();
        }

        // --- Alur UC-03: Reservasi ---
        function openBookingModal(toolId) {
            const tool = toolsData.find(t => t.id === toolId);
            if (!tool) return;
            
            selectedToolId = toolId;
            document.getElementById('modalToolName').innerText = tool.name;
            document.getElementById('modalIcon').className = `fa-solid ${tool.icon}`;
            
            document.getElementById('bookingModal').classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        function submitBooking(event) {
            event.preventDefault(); // Mencegah halaman refresh
            
            // Generate nomor tiket random
            const ticketNum = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('ticketNumber').innerText = ticketNum;
            
            // Tutup modal form, buka modal tiket
            closeModal('bookingModal');
            document.getElementById('ticketModal').classList.remove('hidden');
            
            // Simulasi kurangi stok (Berdasarkan skenario)
            const toolIndex = toolsData.findIndex(t => t.id === selectedToolId);
            if(toolIndex !== -1) {
                toolsData[toolIndex].stock -= 1;
            }
        }

        function finishBooking() {
            closeModal('ticketModal');
            document.getElementById('bookingForm').reset();
            renderCatalog(); // Refresh stok di layar
        }
    </script>
</body>
</html>
